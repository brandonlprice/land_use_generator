    function addLayerFromUrl() {
        const urlInput = document.getElementById("layerUrlInput");
        const url = urlInput.value.trim();

        /*if (!url) {
            alert("Please enter a valid URL.");
            return;
        }*/

        // Determine layer type based on URL keywords (simple approach)
        let layer;
        if (url.includes("FeatureServer")) {
            layer = new FeatureLayer({
                url: url
            });
            console.log("Adding FeatureLayer");
        } else if (url.includes("MapServer")) {
            // Note: If the user provides a specific layer index, e.g., MapServer/0, 
            // it will be treated as a FeatureLayer above. A plain MapServer URL 
            // typically adds all sublayers as a single image.
            layer = new MapImageLayer({
                url: url
            });
            console.log("Adding MapImageLayer");
        } else if (url.toLowerCase().includes(".geojson")) {
            layer = new GeoJSONLayer({
                url: url
            });
            console.log("Adding GeoJSONLayer");
        } else if (url.includes("WMS")) {
            layer = new WMSLayer({
                url: url
            });
            console.log("Adding WMSLayer");
        } /*else {
            alert("Unsupported layer type or URL format.");
            return;
        }*/

        
        map.add(layer);
        
        // Optional: Zoom to the layer's extent once loaded
        layer.when(function() {
            view.goTo(layer.fullExtent);
        }, function(error) {
            console.error("Error loading layer: ", error);
            alert("Failed to load layer. Check the console for details, ensure the URL is correct, and consider potential CORS issues.");
            map.remove(layer); // Remove the problematic layer
        });

        // Clear the input box
        urlInput.value = "";
    }

    // Attach event listener to the button
    document.getElementById("addLayerButton").addEventListener("click", addLayerFromUrl);

// 1. Define a function that handles your click logic
async function openPopupForFeature(geocodedLocation) {

const isPoint = geocodedLocation.type === "point";
// Use positive buffer for points to find the parcel "containing" it
// Use negative buffer for polygons to ensure you select the "same" parcel
const bufferDistance = isPoint ? 1 : -7; 
const spatialRel = isPoint ? "intersects" : "within";

const negativeBuffer = geometryEngine.buffer(geocodedLocation, bufferDistance, "meters");

const query = {
    returnGeometry: true,
    outFields: ["OBJECTID", "AIN"], // Consider limiting fields if possible for performance
    spatialRelationship: spatialRel,
    geometry: negativeBuffer,
	num: 1
  };

  try {
    const results = await parcelLayer.queryFeatures(query);

    if (results.features.length > 0) {
      const foundFeature = results.features[0];

      // 1. Set internal flag to manage interaction logic
      isInternalClick = true;

      // 2. Clear previous and highlight found feature
      clearSelectionAndHighlight(); // Assuming this is defined elsewhere
      selectedFeatureIds = [foundFeature.attributes[parcelLayer.objectIdField]]; // Assuming this is defined elsewhere
      if (parcelLayerView) {
        highlightHandle = parcelLayerView.highlight(foundFeature);
      }

      // 3. Navigate and Open Popup
      await view.goTo(foundFeature.geometry);
      view.openPopup({
        features: [foundFeature],
        location: foundFeature.geometry.centroid || foundFeature.geometry.extent.center,
        // The popup template should ideally be set on the layer itself for simplicity
      });

      // Reset internal click flag after a short delay
      setTimeout(() => {
        isInternalClick = false;
      }, 100);
    } else {
      console.log("No feature found at geocoded location.");
      clearSelectionAndHighlight();
    }
  } catch (error) {
    console.error("Error during feature query: ", error);
    isInternalClick = false;
  }
}

	/*// 1. CHECK: Skip if Measurement Expand is open AND a tool is active
  if (measurementExpand.expanded && measurementWidget.activeTool) {
    return; 
  }*/
  
  if (!parcelLayerView) return;
  
  // IMMEDIATELY set this before async operations
  isInternalClick = true; 

  const response = await view.hitTest(event);
  const graphic = response.results.find((res) => res.graphic.layer === parcelLayer)?.graphic;

  if (!graphic) {
    clearSelectionAndHighlight(); // Clicked empty space
    isInternalClick = false;
    return;
  }

  const featureId = graphic.attributes[parcelLayer.objectIdField];
  const isSelected = selectedFeatureIds.includes(featureId);

  // Update logic (ensure selectedFeatureIds is maintained in higher scope)
  if (event.native.shiftKey) {
    if (!isSelected) selectedFeatureIds.push(featureId);
  } else if (event.native.ctrlKey) {
    if (isSelected) selectedFeatureIds = selectedFeatureIds.filter((id) => id !== featureId);
  } else {
    selectedFeatureIds = [featureId]; // New selection
  }

  // Highlight
  if (highlightHandle) highlightHandle.remove();
  highlightHandle = parcelLayerView.highlight(selectedFeatureIds);

  // Popup Management
  view.popup.open({ features: [graphic], location: event.mapPoint });

  // Reset flag
  setTimeout(() => { isInternalClick = false; }, 150);
});

          }

query.objectIds = selectedFeatureIds;
query.returnGeometry = true;

newFeatureLayer.applyEdits({

  } 
});
    });
  }
  else if (event.action.id === "create-buffer-2") {

          console.log(`Clearing features from ${layer.title}...`); //(`Clearing ${featuresToDelete.length} features from ${layer.title}...`);

        .then(() => {

	  abcLayer.listMode = "show";
	  
	 

	  const abcLayerInfo = editor.layerInfos.find(info => info.layer === abcLayer);

  if (abcLayerInfo) {

    // 3. (Optional) If changes don't reflect automatically, you can reset the layerInfos array

    editor.layerInfos = [...editor.layerInfos]; 
  }

query.objectIds = selectedFeatureIds;

newFeatureLayer.applyEdits({

  } 
});

});
