let clickHandle = null;

function activateTool(view) {
  view.cursor = "crosshair";

  clickHandle = view.on("click", (event) => {
    // 1. Extract coordinates
    const { latitude, longitude } = event.mapPoint;

    // 2. Construct the Google Street View URL
    const url = `https://www.google.com/maps?layer=c&cbll=${latitude},${longitude}`;

    // 3. Open the URL in a new tab
    window.open(url, "_blank");

    console.log("Opening URL:", url);

    deactivateTool(view);
  });
}

function deactivateTool(view) {
  view.cursor = "auto";
  if (clickHandle) {
    clickHandle.remove();
    clickHandle = null;
  }
}

// 1. Shared function for search and click
async function openPopupForFeature(geocodedLocation) {
    const isPoint = geocodedLocation.type === "point";
    const bufferDistance = isPoint ? 1 : -7;
    const spatialRel = isPoint ? "intersects" : "within";
    const negativeBuffer = geometryEngine.buffer(geocodedLocation, bufferDistance, "meters");

    const query = {
        returnGeometry: true,
        outFields: ["OBJECTID", "AIN"],
        spatialRelationship: spatialRel,
        geometry: negativeBuffer,
        num: 1
    };

    try {
        const results = await parcelLayer.queryFeatures(query);
        if (results.features.length > 0) {
            const foundFeature = results.features[0];

            // --- THE FIX ---
            // 1. Set internal flag to true BEFORE clearing/highlighting
            isInternalClick = true;

            // 2. Clear previous
            clearSelectionAndHighlight();

            // 3. Apply new highlight
            selectedFeatureIds = [foundFeature.attributes[parcelLayer.objectIdField]];
            if (parcelLayerView) {
                highlightHandle = parcelLayerView.highlight(foundFeature);
            }

            // 4. Navigate and Open Popup
            await view.goTo(foundFeature.geometry);
            view.openPopup({
                features: [foundFeature],
                location: foundFeature.geometry.centroid || foundFeature.geometry.extent.center,
            });

            // Reset internal click flag after a short delay
            setTimeout(() => {
                isInternalClick = false;
            }, 200);
        } else {
            console.log("No feature found.");
            clearSelectionAndHighlight();
        }
    } catch (error) {
        console.error("Error during feature query: ", error);
        isInternalClick = false; // Reset on error
    }
}

        setTimeout(function() {

        }, 500);
    }
});
	

view.on("click", async (event) => {

  
  if (!parcelLayerView) return;
  
  // IMMEDIATELY set this before async operations
  isInternalClick = true; 

  const response = await view.hitTest(event);
  const graphic = response.results.find((res) => res.graphic.layer === parcelLayer)?.graphic;

  if (!graphic) {
    clearSelectionAndHighlight(); // Clicked empty space
    isInternalClick = false;
    return;
  }

  const featureId = graphic.attributes[parcelLayer.objectIdField];
  const isSelected = selectedFeatureIds.includes(featureId);

  // Update logic (ensure selectedFeatureIds is maintained in higher scope)
  if (event.native.shiftKey) {
    if (!isSelected) selectedFeatureIds.push(featureId);
  } else if (event.native.ctrlKey) {
    if (isSelected) selectedFeatureIds = selectedFeatureIds.filter((id) => id !== featureId);
  } else {
    selectedFeatureIds = [featureId]; // New selection
  }

  // Highlight
  if (highlightHandle) highlightHandle.remove();
  highlightHandle = parcelLayerView.highlight(selectedFeatureIds);

  // Popup Management
  view.popup.open({ features: [graphic], location: event.mapPoint });

  // Reset flag
  setTimeout(() => { isInternalClick = false; }, 150);
});
